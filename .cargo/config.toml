# Workspace-root cargo config.
# Only settings that apply to ALL workspace members belong here.
#
# Firmware-specific settings (embedded target, espflash runner, build-std)
# live in firmware/.cargo/config.toml.

[target.'cfg(all(any(target_arch = "riscv32", target_arch = "xtensa"), target_os = "none"))']
runner = "espflash flash --monitor"

[env]
ESP_LOG = "info"
